name: Build
on:
  schedule:
    - cron: 0 */1 * * *
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GIT_STRATEGY: clone

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/xenhat/dalamud-repo-image:latest
    steps:
      -
        name: Checkout code
        uses: actions/checkout@master
        with:
          token: ${{ secrets.REPO_PUSH_TOKEN }}
          persist-credentials: false
          fetch-depth: 3
      -
        name: Trust all folders
        run: git config --global --add safe.directory '*'
      -
        name: Run merge script
        env:
          MY_ACCESS_TOKEN: ${{ secrets.REPO_PUSH_TOKEN }}
        run: bash scripts/merge_repos.bash
        shell: bash
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # If there are no changes, skip
          if ! git diff --cached --quiet; then
            git commit -m "[skip ci] chore: autopublish" --amend --no-edit
            git push origin HEAD:${{ github.ref_name }} --force-with-lease
          fi
