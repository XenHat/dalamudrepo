image: ghcr.io/xenhat/dalamud-repo-image:latest

default:
  interruptible: true

variables:
  FF_USE_FASTZIP: "true"
  # These can be specified per job or per pipeline (slowest, slow, default, fast, and fastest)
  ARTIFACT_COMPRESSION_LEVEL: "fastest"
  CACHE_COMPRESSION_LEVEL: "fastest"

stages:
  # List of stages for jobs, and their order of execution
  - build

cache:
  key: "$CI_BUILD_REF_NAME" # contains either the branch or the tag, so it's caching per branch
  untracked: true
  paths:
    - "apt-cache/"

build:
  stage: build
  script:
    # Clone the repository via HTTPS inside a new directory
    - git clone "https://${GITLAB_USERNAME}:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${CI_COMMIT_SHA}"
    - ls -al
    # TODO: Put repos in a file, read from file and name repo${index}.tmp.json, dedupe entries.
    # - wget -qO- 'https://git.anna.lgbt/anna/plugin_repo/raw/branch/main/pluginmaster.json' > anna.tmp.json
    - wget -qO- 'https://raw.githubusercontent.com/Aida-Enna/XIVPlugins/main/repo.json' > aidaenna.tmp.json
    - sleep 1
    - wget -qO- 'https://raw.githubusercontent.com/arcticnw/DalamudPlugins/main/repo.json' > actucnw.tmp.json
    - sleep 1
    - wget -qO- 'https://raw.githubusercontent.com/BardToolbox/BardToolbox-Release/master/pluginmaster.json' > bardtoolbox.tmp.json
    - sleep 1
    - wget -qO- 'https://raw.githubusercontent.com/LeonBlade/DalamudPlugins/main/repo.json' > leonblade.tmp.json
    - sleep 1
    - wget -qO- 'https://raw.githubusercontent.com/NightmareXIV/MyDalamudPlugins/main/pluginmaster.json' > nightmarexiv.tmp.json
    - sleep 1
    - wget -qO- 'https://raw.githubusercontent.com/reckhou/DalamudPlugins-Ori/api6/pluginmaster.json' > midibard2.tmp.json
    - sleep 1
    - wget -qO- 'https://raw.githubusercontent.com/Sevii77/ffxiv_materialui_accent/master/repo.json' > materialui.tmp.json
    - sleep 1
    - wget -qO- 'https://raw.githubusercontent.com/SF-XIV/dalamud-plugins/main/repo.json'> sfxiv.tmp.json
    - sleep 1
    - wget -qO- 'https://raw.githubusercontent.com/UnknownX7/DalamudPluginRepo/master/pluginmaster.json' > unknownx7.tmp.json
    - sleep 1
    - wget -qO- 'https://love.puni.sh/ment.json' > punish.tmp.json
    - sleep 1
    - wget -qO- 'https://raw.githubusercontent.com/Chalkos/Marketbuddy/main/repo.json' > mbuddy.tmp.json
    - sleep 1
    - wget -qO- 'https://aetherment.sevii.dev/plugin' > aetherment.tmp.json
    - sleep 1
    - wget -qO- 'https://raw.githubusercontent.com/marzent/IINACT/main/repo.json' > iinact.tmp.json
    - sleep 1
    - wget -qO- 'https://puni.sh/api/repository/veyn' > veyn.tmp.json
    - ls *.tmp.json
    - jq -s 'add' ./*.tmp.json > new_repo.json
    - rm *.tmp.json
    - mv new_repo.json "${CI_COMMIT_SHA}"/repo.json
    # Set the displayed user with the commits that are about to be made
    - git config --global user.email "${GIT_USER_EMAIL:-$GITLAB_USER_EMAIL}"
    - git config --global user.name "${GIT_USER_NAME:-$GITLAB_USER_NAME}"
    # cd into the new cleanly created repo for pushing purposes
    - cd "${CI_COMMIT_SHA}"
    # show repository status in CI log
    - git status
    # Add all generated files to Git
    - git add .
    - |-
      # Check if we have modifications to commit
      CHANGES=$(git status --porcelain | wc -l)

      if [ "$CHANGES" -gt "0" ]; then
        # Show the status of files that are about to be created, updated or deleted
        git status

        # Commit all changes
        git commit -m "[ci skip] Automated update"

        # Change the remote repository to use access token
        git remote rm origin 
        git remote add origin "https://${GITLAB_USERNAME}:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git push --set-upstream origin main
        # Update the repository and make sure to skip the pipeline create for this commit
        git push -o ci.skip || exit 1
      fi
